<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/SPCK/CSS/style.css" />
    <link rel="stylesheet" href="/SPCK/CSS/admin.css" />
  </head>
  <body>
    <!-- ═══ HEADER ═══ -->
    <header>
      <a class="nav-brand" href="main.html">
        <img
          class="nav-logo"
          src="https://img.icons8.com/fluency/96/cinema-.png"
          alt="CineVerse Logo"
        />
        <span class="nav-title">Cine<span>Verse</span></span>
      </a>

      <div class="admin-header-center">
        <span class="admin-badge" id="roleBadge">Loading...</span>
        <span class="admin-header-title">Admin Panel</span>
      </div>

      <nav>
        <a href="main.html">← Back to Site</a>
        <a href="#" class="btn-logout" id="logoutBtn">Log Out</a>
      </nav>
    </header>

    <!-- ═══ LOADING SCREEN ═══ -->
    <div class="admin-loading" id="adminLoading">
      <div class="loading-spinner"></div>
      <p>Verifying access...</p>
    </div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="admin-main" id="adminMain" style="display: none">
      <!-- Tabs -->
      <div class="admin-tabs">
        <button
          class="admin-tab active"
          id="tabMovies"
          onclick="switchTab('movies')"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          Movies
        </button>
        <button class="admin-tab" id="tabUsers" onclick="switchTab('users')">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Users
        </button>
      </div>

      <!-- ═══ MOVIES TAB ═══ -->
      <div class="tab-content" id="moviesTab">
        <div class="tab-header">
          <h2>Manage Movies</h2>
          <button class="btn-add" onclick="openMovieModal()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Movie
          </button>
        </div>

        <div class="movies-table-wrap">
          <table class="admin-table" id="moviesTable">
            <thead>
              <tr>
                <th>Poster</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Year</th>
                <th>Duration</th>
                <th>Rating</th>
                <th>Age</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="moviesTableBody">
              <tr>
                <td colspan="8" class="table-loading">Loading movies...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ═══ USERS TAB ═══ -->
      <div class="tab-content" id="usersTab" style="display: none">
        <div class="tab-header">
          <h2>Manage Admins</h2>
          <!-- Only managers see the Add Admin button -->
          <button
            class="btn-add manager-only"
            id="addAdminBtn"
            onclick="openUserModal()"
            style="display: none"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Admin
          </button>
        </div>

        <div class="movies-table-wrap">
          <table class="admin-table" id="usersTable">
            <thead>
              <tr>
                <th>Email</th>
                <th>Role</th>
                <th>Promoted By</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="4" class="table-loading">Loading users...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- ═══ MOVIE MODAL ═══ -->
    <div class="modal-overlay" id="movieModal" style="display: none">
      <div class="modal">
        <div class="modal-header">
          <h3 id="movieModalTitle">Add Movie</h3>
          <button class="modal-close" onclick="closeMovieModal()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="movieDocId" />
          <div class="form-row">
            <div class="form-group">
              <label>Title</label>
              <input
                type="text"
                id="movieTitle"
                placeholder="e.g. The Shawshank Redemption"
              />
            </div>
            <div class="form-group">
              <label>Genre</label>
              <input type="text" id="movieGenre" placeholder="e.g. Drama" />
            </div>
          </div>
          <div class="form-group">
            <label>Poster URL</label>
            <input type="text" id="moviePoster" placeholder="https://..." />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Year</label>
              <input type="number" id="movieYear" placeholder="e.g. 1994" />
            </div>
            <div class="form-group">
              <label>Duration (min)</label>
              <input type="number" id="movieDuration" placeholder="e.g. 142" />
            </div>
            <div class="form-group">
              <label>Rating (0–10)</label>
              <input
                type="number"
                id="movieRating"
                placeholder="e.g. 9.3"
                step="0.1"
                min="0"
                max="10"
              />
            </div>
            <div class="form-group">
              <label>Age Rating</label>
              <input type="text" id="movieAge" placeholder="e.g. R, PG-13" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeMovieModal()">Cancel</button>
          <button class="btn-save" id="saveMovieBtn" onclick="saveMovie()">
            Save Movie
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ USER MODAL (Add Admin — Manager only) ═══ -->
    <div class="modal-overlay" id="userModal" style="display: none">
      <div class="modal">
        <div class="modal-header">
          <h3>Add Admin</h3>
          <button class="modal-close" onclick="closeUserModal()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>User UID</label>
            <input
              type="text"
              id="newAdminUid"
              placeholder="Firebase Auth UID"
            />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="newAdminEmail"
              placeholder="user@email.com"
            />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="newAdminRole">
              <option value="false">Admin</option>
              <option value="true">Manager</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeUserModal()">Cancel</button>
          <button class="btn-save" onclick="saveNewAdmin()">Add Admin</button>
        </div>
      </div>
    </div>

    <!-- ═══ CONFIRM MODAL ═══ -->
    <div class="modal-overlay" id="confirmModal" style="display: none">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 id="confirmTitle">Confirm Action</h3>
        </div>
        <div class="modal-body">
          <p id="confirmMessage">Are you sure?</p>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
          <button class="btn-danger" id="confirmOkBtn">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="/SPCK/JS/admin.js"></script>
  </body>
</html>
