<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse - Sign In</title>
    <link rel="stylesheet" href="../CSS/signin.css" />
  </head>
  <body>
    <div class="container">
      <img
        class="nav-logo"
        src="../IMG/7ab527ee-b144-4b6f-8cb0-5f361a134241_removalai_preview.png"
        alt="CineVerse Logo"
      />

      <h2>Sign into your CineVerse account</h2>

      <form onsubmit="login(event)">
        <label>Email</label>
        <input
          id="email"
          class="input-field"
          type="email"
          placeholder="Enter your Email..."
          required
        />

        <label>Password</label>
        <input
          id="password"
          class="input-field"
          type="password"
          placeholder="Enter your Password..."
          required
        />

        <div class="checkbox">
          <input type="checkbox" id="showPass" onclick="togglePassword()" />
          <label for="showPass">Show Password</label>
        </div>

        <button class="btn" type="submit">Sign in</button>
      </form>

      <!-- Google Sign In Button -->
      <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>

      <div class="signup">
        Don't have an Account? <a href="signup.html">Sign up</a>
      </div>
    </div>

    <script type="module" src="../JS/signin.js"></script>
  </body>
</html>
