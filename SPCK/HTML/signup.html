<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse - Sign Up</title>
    <link rel="stylesheet" href="../CSS/signup.css" />
  </head>
  <body>
    <div class="container">
      <img
        src="../IMG/7ab527ee-b144-4b6f-8cb0-5f361a134241_removalai_preview.png"
        alt="Logo"
      />

      <h2>Create your CineVerse account</h2>

      <form onsubmit="return false;">
        <label>Fullname</label>
        <input
          id="fullname"
          type="text"
          placeholder="Enter your Fullname..."
          required
        />

        <label>Email</label>
        <input
          id="email"
          type="email"
          placeholder="Enter your Email..."
          required
        />

        <label>Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter your Password..."
          required
        />

        <label>Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm your Password..."
          required
        />

        <div class="checkbox">
          <input type="checkbox" id="showPass" onclick="togglePassword()" />
          <label for="showPass">Show Passwords</label>
        </div>

        <button class="btn" type="button" onclick="register()">Sign up</button>
      </form>

      <!-- Google Sign Up Button -->
      <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>

      <div class="signup">
        Already have an Account?
        <a href="../HTML/signin.html">Sign in</a>
      </div>
    </div>

    <script type="module" src="../JS/signup.js"></script>
  </body>
</html>
