<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="signin.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="drop-icon"></div>
      <h2>SIGN IN</h2>
      <form id="loginForm">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email..."
          required
        />

        <label for="password">Password</label>
        <div class="password-container">
          <input
            type="password"
            id="password"
            placeholder="Enter your password..."
            required
          />
        </div>
        <button type="submit" class="login-btn">SIGN IN</button>
      </form>
    </div>

    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyBpC_RSKp0qCtO2BOS1rUmjv12wyN3OpE0",
        authDomain: "jsi13-c67f2.firebaseapp.com",
        projectId: "jsi13-c67f2",
        storageBucket: "jsi13-c67f2.firebasestorage.app",
        messagingSenderId: "107804399992",
        appId: "1:107804399992:web:8ff1623a53b05a67bcd08d",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth();
      const loginForm = document.querySelector("#loginForm");

      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const valueEmail = document.querySelector("#email").value;
        const valuePassword = document.querySelector("#password").value;

        console.log("Button clicked");
        console.log(valueEmail);
        console.log(valuePassword);

        signInWithEmailAndPassword(auth, valueEmail, valuePassword)
          .then((userCredential) => {
            const user = userCredential.user;
            window.location.href = "about.html";
          })
          .catch((error) => {
            const errorCode = error.code;
            const errorMessage = error.message;
            alert("Error: " + errorMessage);
          });
      });
    </script>
  </body>
</html>
